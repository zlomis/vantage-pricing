[build]
  functions = "netlify/functions"

# v50.9 (2026-05-10): bump function timeout. Default is 10s, which can be too
# short for Sonnet's SoA extraction call on a multi-page synopsis PDF —
# OT01P201 (17 pages) consistently exceeded 10s, causing 504 timeouts that
# manifested as the orange "Schedule of Activities extraction failed" banner.
# 26s is the max for Netlify Pro tier; sufficient for nearly all SoA calls.
[functions]
  timeout = 26

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate-excel"
  status = 200
  force = true
