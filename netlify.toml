[build]
  functions = "netlify/functions"

[functions]
  # Markdown files used by claude-proxy.js for SoA extraction must be explicitly
  # included in the function bundle — Netlify only packages .js by default.
  included_files = [
    "netlify/functions/extractSoA_prompt.md",
    "netlify/functions/procedure_vocabulary.md"
  ]

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate-excel"
  status = 200
  force = true

